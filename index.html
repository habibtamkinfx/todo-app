<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>TODO APP</title>
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>
          <i class="fas fa-check-circle"></i>
          My Tasks
        </h1>
        <p id="date"></p>
      </header>
      <div class="input-container">
        <input
          type="text"
          class="todo-task"
          id="todo-task"
          placeholder="What do you need to do?"
        />
        <button class="add-btn" id="add-btn">
          <i class="fas fa-plus"></i>
        </button>
      </div>
      <div class="filters">
        <span class="filter active" data-filter="all">All</span>
        <span class="filter" data-filter="active">Active</span>
        <span class="filter" data-filter="completed">Completed</span>
      </div>
      <div class="todos-container">
        <ul id="todos-list">
          <!-- <li class="todo-item">
            <label for="todo-checkbox" class="checkbox-container">
              <input type="checkbox" class="todo-checkbox" />
              <span class="checkmark"></span>
            </label>
            <span class="todo-item-text">Sample Task</span>
            <button class="delete-btn">
              <i class="fas fa-trash"></i>
            </button>
          </li> -->
        </ul>
        <div class="empty-state hidden">
          <i class="fas fa-clipboard-list"></i>
          <p>No tasks to show</p>
        </div>
      </div>
      <footer>
        <p id="items-left">0 items left</p>
        <button id="clear-completed">Clear Completed</button>
      </footer>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
